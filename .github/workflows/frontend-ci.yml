name: Frontend CI

on:
  push:
    paths:
      - "src/**"
      - "package-lock.json"
      - "package.json"
      - "next.config.*"
      - "Dockerfile"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "package-lock.json"
      - "package.json"
      - "next.config.*"
      - "Dockerfile"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
