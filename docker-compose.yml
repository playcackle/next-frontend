version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
        - AUTH_SECRET=${AUTH_SECRET:-Tyq8N0UATfZDomQLcUqxodFOLuedd87vRDfUV5Wq5r0=}
        - NEXT_PUBLIC_LOBBY_MANAGER_URL=${NEXT_PUBLIC_LOBBY_MANAGER_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Server-side URL (inside container) - use host.docker.internal
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8001}
      # Client-side URL (for browser) - use localhost
      - NEXT_PUBLIC_LOBBY_MANAGER_URL=${NEXT_PUBLIC_LOBBY_MANAGER_URL:-http://localhost:8001}
      # NextAuth configuration
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_SECRET=${AUTH_SECRET:-Tyq8N0UATfZDomQLcUqxodFOLuedd87vRDfUV5Wq5r0=}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
